name: Build Client and Sync

on:
  push: # run on every push to any branch
    paths-ignore:
      - 'backend/public/**'

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install and build client (pnpm preferred, fallback to npm)
        run: |
          set -e
          corepack enable || true
          corepack prepare pnpm@latest --activate || true
          cd client
          if command -v pnpm >/dev/null 2>&1; then
            echo "pnpm available — attempting pnpm install"
            if pnpm install --frozen-lockfile; then
              pnpm run build
            else
              echo "pnpm install failed — falling back to npm"
              npm install --legacy-peer-deps
              npm run build
            fi
          else
            echo "pnpm not available — using npm"
            npm install --legacy-peer-deps
            npm run build
          fi

      - name: Sync dist to backend/public
        run: |
          mkdir -p backend/public
          cp -a client/dist/. backend/public/

      - name: Commit built assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/public || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(ci): update built client assets [skip ci]"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No changes to built assets."
          fi
