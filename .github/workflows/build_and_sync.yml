name: Build Client and Sync

permissions:
  contents: write

on:
  push: # run on every push to any branch
    paths-ignore:
      - 'backend/public/**'

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install and build client (pnpm preferred, fallback to npm)
        run: |
          set -e
          corepack enable || true
          corepack prepare pnpm@latest --activate || true
          cd client
          if command -v pnpm >/dev/null 2>&1; then
            echo "pnpm available — attempting pnpm install"
            if pnpm install --frozen-lockfile; then
              pnpm run build
            else
              echo "pnpm install failed — falling back to npm"
              npm install --legacy-peer-deps
              npm run build
            fi
          else
            echo "pnpm not available — using npm"
            npm install --legacy-peer-deps
            npm run build
          fi

      # Note: we no longer copy/commit built assets back to the repo.
      # The deployment environment (Render) will build the client during install.
